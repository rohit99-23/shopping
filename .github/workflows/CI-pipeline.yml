name: Shopping app

on: 
  push:
    branches:
      - main


  jobs:
    Image-build:
       runs-on: ubuntu-latest

       steps:
         - name: checkout code
           uses: actions/checkout@v3

         - name: Login to Docker hub
           uses: docker/login-actions@v2
           with:
             username: ${{secrets.DOCKER_USERNAME}}
             password: ${{secrets.DOCKER_PASSWORD}}


         - name: Build Docker image
           run: |
             docker build -t errohit07/frontend ./frontend

         - name: Push image
           run: |
             docker push errohit07/frontend

         - name: Build Docker image
           run: |
             docker build -t errohit07/user-service ./backend/services/user-service

         - name: Push image
           run: |
             docker push errohit07/user-service

         - name: Build Docker image
           run: |
             docker build -t errohit07/order-service ./backend/services/order-service

         - name: Push image
           run: |
             docker push errohit07/order-service

          - name: Build Docker image
           run: |
             docker build -t errohit07/product-service ./backend/services/product-service

         - name: Push image
           run: |
             docker push errohit07/product-service

