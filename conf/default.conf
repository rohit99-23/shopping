upstream frontend_12 {
    server frontend:80;
}

server {
    listen 80;

    location / {
        proxy_pass http://frontend_12;
    }

    location /api/products {
        proxy_pass http://product-service:5003;
    }

    location /api/users {
        proxy_pass http://user-service:5001;
    }

    location /api/orders {
        proxy_pass http://order-service:5002;
    }
}
