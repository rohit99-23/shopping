upstream frontend_upstream {
    server frontend:80;
}

server {
    listen 80;

    location / {
        proxy_pass http://frontend_upstream/;
    }

    location /api/products {

        proxy_pass http://product-service:80/;
    }

    location /api/users {
        proxy_pass http://user-service:80/;
    }

    location /api/orders {
        proxy_pass http://order-service:80/;
    }
}
