services:
  nginx:
    image: nginx
    ports:
      - "3000:80"
    volumes:
      - ./conf/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend

  frontend:
    image: errohit07/frontend
    expose:
      - "80"
    depends_on:
      - user-service
      - product-service
      - order-service

  user-service:
    image: errohit07/user-service
    expose:
      - "5001"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/amazona
      - PORT=5001


  order-service:
    image: errohit07/order-service
    expose:
      - "5002"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/amazona
      - PORT=5002


  product-service:
    image: errohit07/product-service
    expose:
      - "5003"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/amazona
      - PORT=5003

  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

