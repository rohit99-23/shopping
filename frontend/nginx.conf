server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/products {
        proxy_pass http://product-service/api/products;
    }

    location /api/users {
        proxy_pass http://user-service/api/users;
    }

    location /api/orders {
        proxy_pass http://order-service/api/orders;
    }
}
