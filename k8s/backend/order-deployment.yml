apiVersion: v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: user-service-container
          image: errohit07/order-service
          ports:
          - containerPort: 5002
