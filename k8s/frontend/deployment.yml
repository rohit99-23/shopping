apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend

  template: 
    metadata:
      labels: 
        app: frontend
    spec:
      containers:
        - name: frontend-container
          image: errohit07/frontend:<tag>
          imagePullPolicy: Always

          ports: 
          - containerPort: 3000

