apiVersion: v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend

  template: 
    metadata:
      labels: 
        app: frontend
    spec:
      containers:
        - name: frontend-container
          image: errohit07/frontend
          ports: 
          - containerPort: 3000

