apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
spec:
  rules:
  - host: shopping.local
    http:
      paths:
      - path: /
        pathType: Prefix
        Backend:
          service:
            name: frontend
            port:
              number: 80

      - path: /api/users
        pathType: Prefix
        Backend:
          service:
            name: user-service
            port:
              number: 80



      - path: /api/products
        pathType: Prefix
        Backend:
          service:
            name: product-service
            port:
              number: 80


      - path: /api/orders
        pathType: Prefix
        Backend:
          service:
            name: order-service
            port:
              number: 80
